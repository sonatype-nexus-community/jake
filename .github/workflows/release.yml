name: Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PYTHON_VERSION_DEFAULT: "3.10"
  POETRY_VERSION: "1.8.3"
  REPORTS_DIR: CI_reports

jobs:

  release:
    # Skip the release commits that python-semantic-release itself creates
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install dependencies
        run: |
          pip install "poetry==1.8.3"
          poetry config virtualenvs.create false
          poetry install --no-ansi

      - name: Sonatype Lifecycle Evaluate (Release Stage)
        uses: sonatype/actions/evaluate@v1
        with:
          iq-server-url: ${{ vars.SONATYPE_PLATFORM_URL }}
          username: ${{ secrets.SONATYPE_LIFECYCLE_USERNAME }}
          password: ${{ secrets.SONATYPE_LIFECYCLE_PASSWORD }}
          application-id: jake
          stage: release
          scan-targets: '.'

      - name: Python Semantic Release
        id: semrel
        uses: python-semantic-release/python-semantic-release@0dc72ac9058a62054a45f6344c83a423d7f906a8 # v9.21.1
        with:
          git_committer_email: ${{ secrets.BRENT_SPINER_EMAIL }}
          git_committer_name: "Brent Spiner"
          github_token: ${{ secrets.BRENT_SPINER_PAT }}
          ssh_public_signing_key: ${{ secrets.SSH_SIGNING_PUBLIC_KEY }}
          ssh_private_signing_key: ${{ secrets.SSH_SIGNING_PRIVATE_KEY }}

      - name: Publish to PyPI
        if: steps.semrel.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          password: ${{ secrets.PYPI_TOKEN }}
